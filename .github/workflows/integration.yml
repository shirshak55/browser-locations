name: integration

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 4 * * 3"

jobs:
  linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Chrome (stable, beta, dev)
        run: |
          curl -fsSL https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable google-chrome-beta google-chrome-unstable

      - name: Install Chromium
        run: sudo apt-get install -y chromium-browser || sudo snap install chromium

      - name: Install Edge (stable, beta, dev)
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-edge.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-edge.gpg] https://packages.microsoft.com/repos/edge stable main" | sudo tee /etc/apt/sources.list.d/microsoft-edge.list
          sudo apt-get update
          sudo apt-get install -y microsoft-edge-stable microsoft-edge-beta microsoft-edge-dev

      - name: Install Firefox (stable)
        run: sudo apt-get install -y firefox

      - name: Install Firefox ESR
        run: |
          curl -fsSL -o /tmp/firefox-esr.tar.xz "https://download.mozilla.org/?product=firefox-esr-latest-ssl&os=linux64&lang=en-US"
          sudo mkdir -p /opt/firefox-esr
          sudo tar -xJf /tmp/firefox-esr.tar.xz --strip-components=1 -C /opt/firefox-esr
          sudo ln -sf /opt/firefox-esr/firefox /usr/bin/firefox-esr

      - name: Install Firefox Beta
        run: |
          curl -fsSL -o /tmp/firefox-beta.tar.xz "https://download.mozilla.org/?product=firefox-beta-latest-ssl&os=linux64&lang=en-US"
          sudo mkdir -p /opt/firefox-beta
          sudo tar -xJf /tmp/firefox-beta.tar.xz --strip-components=1 -C /opt/firefox-beta
          sudo ln -sf /opt/firefox-beta/firefox /usr/bin/firefox-beta

      - name: Install Firefox Developer Edition
        run: |
          curl -fsSL -o /tmp/firefox-devedition.tar.xz "https://download.mozilla.org/?product=firefox-devedition-latest-ssl&os=linux64&lang=en-US"
          sudo mkdir -p /opt/firefox-developer-edition
          sudo tar -xJf /tmp/firefox-devedition.tar.xz --strip-components=1 -C /opt/firefox-developer-edition
          sudo ln -sf /opt/firefox-developer-edition/firefox /usr/bin/firefox-developer-edition

      - name: Install Firefox Nightly
        run: |
          curl -fsSL -o /tmp/firefox-nightly.tar.xz "https://download.mozilla.org/?product=firefox-nightly-latest-ssl&os=linux64&lang=en-US"
          sudo mkdir -p /opt/firefox-nightly
          sudo tar -xJf /tmp/firefox-nightly.tar.xz --strip-components=1 -C /opt/firefox-nightly
          sudo ln -sf /opt/firefox-nightly/firefox /usr/bin/firefox-nightly

      - name: Install Brave (stable, beta, nightly)
        run: |
          curl -fsSLo /tmp/brave-keyring.gpg https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
          sudo install -o root -g root -m 644 /tmp/brave-keyring.gpg /usr/share/keyrings/brave-browser-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] https://brave-browser-apt-release.s3.brave.com/ stable main" | sudo tee /etc/apt/sources.list.d/brave-browser-release.list
          sudo apt-get update
          sudo apt-get install -y brave-browser brave-browser-beta brave-browser-nightly

      - name: Install Opera (stable, beta, developer)
        run: |
          curl -fsSL https://deb.opera.com/archive.key | sudo gpg --dearmor -o /usr/share/keyrings/opera.gpg
          echo "deb [signed-by=/usr/share/keyrings/opera.gpg] https://deb.opera.com/opera-stable/ stable non-free" | sudo tee /etc/apt/sources.list.d/opera-stable.list
          echo "deb [signed-by=/usr/share/keyrings/opera.gpg] https://deb.opera.com/opera-beta/ stable non-free" | sudo tee /etc/apt/sources.list.d/opera-beta.list
          echo "deb [signed-by=/usr/share/keyrings/opera.gpg] https://deb.opera.com/opera-developer/ stable non-free" | sudo tee /etc/apt/sources.list.d/opera-developer.list
          sudo apt-get update
          sudo apt-get install -y opera-stable opera-beta opera-developer

      - name: Install Vivaldi (stable, snapshot)
        run: |
          curl -fsSL https://repo.vivaldi.com/archive/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/vivaldi.gpg
          echo "deb [signed-by=/usr/share/keyrings/vivaldi.gpg] https://repo.vivaldi.com/archive/deb/ stable main" | sudo tee /etc/apt/sources.list.d/vivaldi.list
          sudo apt-get update
          sudo apt-get install -y vivaldi-stable vivaldi-snapshot

      - name: Install LibreWolf
        run: |
          sudo apt-get install -y extrepo
          sudo extrepo enable librewolf
          sudo apt-get update
          sudo apt-get install -y librewolf

      - name: Install Floorp
        run: |
          curl -fsSL https://ppa.floorp.app/KEY.gpg | sudo gpg --dearmor -o /usr/share/keyrings/Floorp.gpg
          sudo curl -sS --compressed -o /etc/apt/sources.list.d/Floorp.list "https://ppa.floorp.app/Floorp.list"
          sudo apt-get update
          sudo apt-get install -y floorp

      - name: Install Zen Browser
        run: curl -fsSL https://github.com/zen-browser/updates-server/raw/refs/heads/main/install.sh | bash

      - name: Install Helium
        run: |
          curl -fsSL https://raw.githubusercontent.com/nicoth-in/helium-browser-linux/main/pubkey.asc | sudo gpg --dearmor -o /usr/share/keyrings/helium.gpg
          echo "deb [signed-by=/usr/share/keyrings/helium.gpg] https://pkg.helium.computer/deb stable main" | sudo tee /etc/apt/sources.list.d/helium.list
          sudo apt-get update
          sudo apt-get install -y helium-bin

      - name: List installed browsers
        run: |
          echo "=== Installed browsers ==="
          for cmd in google-chrome google-chrome-beta google-chrome-unstable \
                     chromium chromium-browser \
                     microsoft-edge-stable microsoft-edge-beta microsoft-edge-dev \
                     firefox firefox-beta firefox-developer-edition firefox-nightly firefox-esr \
                     brave-browser brave-browser-beta brave-browser-nightly \
                     opera opera-beta opera-developer \
                     vivaldi vivaldi-stable vivaldi-snapshot \
                     librewolf floorp zen-browser helium; do
            if command -v "$cmd" &>/dev/null; then
              echo "  ✓ $cmd"
            fi
          done

      - name: Run integration tests
        run: cargo test -p browser-locations --all-features -- --ignored

  macos:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Chrome (stable, beta, dev, canary)
        run: |
          brew install --cask google-chrome
          brew install --cask google-chrome@beta
          brew install --cask google-chrome@dev
          brew install --cask google-chrome@canary

      - name: Install Chromium
        run: brew install --cask chromium

      - name: Install Edge (stable, beta, dev, canary)
        run: |
          brew install --cask microsoft-edge
          brew install --cask microsoft-edge@beta
          brew install --cask microsoft-edge@dev
          brew install --cask microsoft-edge@canary

      - name: Install Firefox (stable, developer-edition, nightly)
        run: |
          brew install --cask firefox
          brew install --cask firefox@developer-edition
          brew install --cask firefox@nightly

      - name: Install Firefox Beta (direct DMG — brew cask conflicts with stable)
        run: |
          curl -fsSL -o /tmp/firefox-beta.dmg "https://download.mozilla.org/?product=firefox-beta-latest-ssl&os=osx&lang=en-US"
          hdiutil attach /tmp/firefox-beta.dmg -nobrowse
          cp -R "/Volumes/Firefox/Firefox.app" "/Applications/Firefox Beta.app"
          hdiutil detach "/Volumes/Firefox"

      - name: Install Firefox ESR (direct DMG — brew cask conflicts with stable)
        run: |
          curl -fsSL -o /tmp/firefox-esr.dmg "https://download.mozilla.org/?product=firefox-esr-latest-ssl&os=osx&lang=en-US"
          hdiutil attach /tmp/firefox-esr.dmg -nobrowse
          cp -R "/Volumes/Firefox/Firefox.app" "/Applications/Firefox ESR.app"
          hdiutil detach "/Volumes/Firefox"

      - name: Install Brave (stable, beta, nightly)
        run: |
          brew install --cask brave-browser
          brew install --cask brave-browser@beta
          brew install --cask brave-browser@nightly

      - name: Install Opera (stable, beta, developer)
        run: |
          brew install --cask opera
          brew install --cask opera@beta
          brew install --cask opera@developer

      - name: Install Vivaldi (stable, snapshot)
        run: |
          brew install --cask vivaldi
          brew install --cask vivaldi@snapshot

      - name: Install Arc
        run: brew install --cask arc

      - name: Install LibreWolf
        run: brew install --cask librewolf

      - name: Install Floorp
        run: brew install --cask floorp

      - name: Install Zen Browser
        run: brew install --cask zen-browser

      - name: Install Helium
        run: brew install --cask helium-browser

      - name: List installed browsers
        run: |
          echo "=== Installed browsers ==="
          for app in "Google Chrome" "Google Chrome Beta" "Google Chrome Dev" "Google Chrome Canary" \
                     "Chromium" \
                     "Microsoft Edge" "Microsoft Edge Beta" "Microsoft Edge Dev" "Microsoft Edge Canary" \
                     "Firefox" "Firefox Developer Edition" "Firefox Nightly" \
                     "Brave Browser" "Brave Browser Beta" "Brave Browser Nightly" \
                     "Opera" "Opera Beta" "Opera Developer" \
                     "Vivaldi" "Vivaldi Snapshot" \
                     "Arc" "LibreWolf" "Floorp" "Zen" "Zen Twilight" "Helium"; do
            app_path="/Applications/${app}.app"
            if [ -d "$app_path" ]; then
              echo "  ✓ ${app}"
            fi
          done

      - name: Run integration tests
        run: cargo test -p browser-locations --all-features -- --ignored

  windows:
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Chrome
        run: choco install googlechrome -y --no-progress --ignore-checksums

      - name: Install Chromium
        run: choco install chromium -y --no-progress --ignore-checksums

      - name: Install Firefox (stable)
        run: choco install firefox -y --no-progress --ignore-checksums

      - name: Install Firefox Beta
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://download.mozilla.org/?product=firefox-beta-latest-ssl&os=win64&lang=en-US" -OutFile "$env:TEMP\firefox-beta.exe" -MaximumRetryCount 3
          Start-Process -Wait -FilePath "$env:TEMP\firefox-beta.exe" -ArgumentList '/S', '/InstallDirectoryPath=C:\Program Files\Firefox Beta'

      - name: Install Firefox Developer Edition
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://download.mozilla.org/?product=firefox-devedition-latest-ssl&os=win64&lang=en-US" -OutFile "$env:TEMP\firefox-devedition.exe" -MaximumRetryCount 3
          Start-Process -Wait -FilePath "$env:TEMP\firefox-devedition.exe" -ArgumentList '/S', '/InstallDirectoryPath=C:\Program Files\Firefox Developer Edition'

      - name: Install Firefox Nightly
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://download.mozilla.org/?product=firefox-nightly-latest-ssl&os=win64&lang=en-US" -OutFile "$env:TEMP\firefox-nightly.exe" -MaximumRetryCount 3
          Start-Process -Wait -FilePath "$env:TEMP\firefox-nightly.exe" -ArgumentList '/S', '/InstallDirectoryPath=C:\Program Files\Firefox Nightly'

      - name: Install Firefox ESR
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://download.mozilla.org/?product=firefox-esr-latest-ssl&os=win64&lang=en-US" -OutFile "$env:TEMP\firefox-esr.exe" -MaximumRetryCount 3
          Start-Process -Wait -FilePath "$env:TEMP\firefox-esr.exe" -ArgumentList '/S', '/InstallDirectoryPath=C:\Program Files\Firefox ESR'

      - name: Install Brave (stable, nightly)
        run: |
          choco install brave -y --no-progress --ignore-checksums
          choco install brave-nightly -y --no-progress --ignore-checksums

      - name: Install Edge Beta
        shell: pwsh
        run: |
          $url = "https://go.microsoft.com/fwlink/?linkid=2109047&Channel=Beta&language=en&consent=1"
          $installer = "$env:TEMP\MicrosoftEdgeBeta.msi"
          Invoke-WebRequest -Uri $url -OutFile $installer -MaximumRetryCount 3
          Start-Process -Wait msiexec -ArgumentList "/i `"$installer`" /quiet /norestart"

      - name: Install Edge Dev
        shell: pwsh
        run: |
          $url = "https://go.microsoft.com/fwlink/?linkid=2084706&Channel=Dev&language=en&consent=1"
          $installer = "$env:TEMP\MicrosoftEdgeDev.msi"
          Invoke-WebRequest -Uri $url -OutFile $installer -MaximumRetryCount 3
          Start-Process -Wait msiexec -ArgumentList "/i `"$installer`" /quiet /norestart"

      - name: Install Edge Canary
        shell: pwsh
        run: |
          $url = "https://go.microsoft.com/fwlink/?linkid=2084649&Channel=Canary&language=en&consent=1"
          $installer = "$env:TEMP\MicrosoftEdgeCanary.msi"
          Invoke-WebRequest -Uri $url -OutFile $installer -MaximumRetryCount 3
          Start-Process -Wait msiexec -ArgumentList "/i `"$installer`" /quiet /norestart"

      - name: Install Opera (stable, beta)
        run: |
          choco install opera -y --no-progress --ignore-checksums
          choco install opera-beta -y --no-progress --ignore-checksums

      - name: Install Vivaldi
        run: choco install vivaldi -y --no-progress --ignore-checksums

      - name: Install LibreWolf
        run: choco install librewolf -y --no-progress --ignore-checksums

      - name: Run integration tests
        run: cargo test -p browser-locations --all-features -- --ignored
