name: publish

on:
  release:
    types: [published]

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - run: cargo package --workspace --no-verify

  publish:
    needs: ci
    runs-on: ubuntu-24.04
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish all crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          publish() {
            echo "Publishing $1..."
            if cargo publish -p "$1"; then
              echo "$1 published successfully"
            else
              echo "$1 may already be published, skipping"
            fi
          }

          publish browser-locations-core
          publish arc-locations
          publish brave-locations
          publish chrome-locations
          publish chromium-locations
          publish edge-locations
          publish firefox-locations
          publish floorp-locations
          publish helium-locations
          publish librewolf-locations
          publish opera-locations
          publish vivaldi-locations
          publish zen-locations
          publish browser-locations
